<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #1e293b;
            color: white;
            border-radius: 15px;
            width: 350px;
        }
    </style>
</head>

<body>

<div class="card p-4 shadow-lg">
    <h3 class="text-center mb-4">Admin Login</h3>

    <form onsubmit="login(event)">

        <input id="user" class="form-control mb-3" type="text" placeholder="Username" required>

        <input id="pass" class="form-control mb-3" type="password" placeholder="Password" required>

        <button class="btn btn-primary w-100">Login</button>

    </form>

    <p id="msg" class="text-danger text-center mt-2"></p>
</div>

<script>
function login(event) {
    event.preventDefault();

    fetch("http://localhost:8080/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            username: document.getElementById("user").value,
            password: document.getElementById("pass").value
        })
    })
    .then(res => res.text())
    .then(data => {

        if(data === "success") {
            localStorage.setItem("admin", "true");
            window.location.href = "dashboard.html";
        } else {
            document.getElementById("msg").innerText = "Invalid Login!";
        }

    });
}
</script>

</body>
</html>
