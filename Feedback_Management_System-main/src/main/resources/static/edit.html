<!DOCTYPE html>
<html>
<head>
    <title>Edit Feedback</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }
        .card {
            background: #1e293b;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

<div class="card p-4">
<h2>Edit Feedback</h2>

<form onsubmit="updateData(event)">

    <input type="hidden" id="id">

    <input class="form-control mb-3" type="text" id="name" required>

    <input class="form-control mb-3" type="email" id="email" required>

    <select class="form-control mb-3" id="rating">
        <option value="1">⭐ 1</option>
        <option value="2">⭐⭐ 2</option>
        <option value="3">⭐⭐⭐ 3</option>
        <option value="4">⭐⭐⭐⭐ 4</option>
        <option value="5">⭐⭐⭐⭐⭐ 5</option>
    </select>

    <textarea class="form-control mb-3" id="comments"></textarea>

    <button class="btn btn-success">Update</button>

</form>
</div>

</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

document.getElementById("id").value = id;

fetch("http://localhost:8080/feedback/" + id)
.then(res => res.json())
.then(data => {
    document.getElementById("name").value = data.name;
    document.getElementById("email").value = data.email;
    document.getElementById("rating").value = data.rating;
    document.getElementById("comments").value = data.comments;
});
</script>

<script>
function updateData(event) {
    event.preventDefault();

    fetch("http://localhost:8080/update/" + id, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            rating: document.getElementById("rating").value,
            comments: document.getElementById("comments").value
        })
    })
    .then(() => {
        alert("Updated Successfully!");
        window.location.href = "dashboard.html";
    });
}
</script>

</body>
</html>
