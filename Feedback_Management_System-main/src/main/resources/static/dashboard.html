<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }

        .card {
            background: #1e293b;
            border-radius: 15px;
        }

        table {
            background: white;
            color: black;
        }

        h2 {
            font-weight: bold;
        }
    </style>
</head>

<body>

<script>
if(localStorage.getItem("admin") !== "true"){
    window.location.href = "login.html";
}
</script>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Admin Dashboard</h2>
        <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>

    <input type="text" id="search" class="form-control mb-3" placeholder="🔍 Search feedback...">

    <div class="card p-3 mb-4">
        <h5> Rating Analytics</h5>
        <canvas id="ratingChart"></canvas>
    </div>

    <div class="card p-3">
        <h5>All Feedback</h5>

        <table class="table table-bordered mt-3" id="feedbackTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Rating</th>
                    <th>Comments</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody></tbody>
        </table>
    </div>

</div>

<script>
function loadData() {
    fetch("http://localhost:8080/all-feedback")
    .then(res => res.json())
    .then(data => {

        let table = document.querySelector("#feedbackTable tbody");
        table.innerHTML = "";

        data.forEach(f => {
            table.innerHTML += `
                <tr>
                    <td>${f.id}</td>
                    <td>${f.name}</td>
                    <td>${f.email}</td>
                    <td>⭐ ${f.rating}</td>
                    <td>${f.comments}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="editData(${f.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteData(${f.id})">Delete</button>
                    </td>
                </tr>
            `;
        });

    });
}

loadData();
</script>

<script>
function deleteData(id) {
    if(confirm("Delete this feedback?")) {
        fetch("http://localhost:8080/delete/" + id, {
            method: "DELETE"
        })
        .then(() => loadData());
    }
}
</script>

<script>
function editData(id) {
    window.location.href = "edit.html?id=" + id;
}
</script>

<script>
document.getElementById("search").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#feedbackTable tbody tr");

    rows.forEach(row => {
        let text = row.innerText.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});
</script>

<script>
fetch("http://localhost:8080/chart")
.then(res => res.json())
.then(data => {

    new Chart(document.getElementById("ratingChart"), {
        type: 'bar',
        data: {
            labels: ["1⭐","2⭐","3⭐","4⭐","5⭐"],
            datasets: [{
                label: "Ratings Count",
                data: data,
                backgroundColor: [
                    "#ef4444",
                    "#f97316",
                    "#eab308",
                    "#22c55e",
                    "#3b82f6"
                ]
            }]
        }
    });

});
</script>

<script>
function logout() {
    localStorage.removeItem("admin");
    window.location.href = "login.html";
}
</script>

</body>
</html>
